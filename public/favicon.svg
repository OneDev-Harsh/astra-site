<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Primary purple gradient - deep to bright -->
    <linearGradient id="core" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="40%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>

    <!-- Radial glow from center -->
    <radialGradient id="glowCenter" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Orbital ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Apex star gradient -->
    <radialGradient id="apexGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="40%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background radial glow -->
  <circle cx="16" cy="16" r="15" fill="url(#glowCenter)"/>

  <!-- Outer orbital ring - tilted ellipse -->
  <ellipse cx="16" cy="16" rx="14" ry="5.5" fill="none" stroke="url(#ringGrad)" stroke-width="0.5" transform="rotate(-15 16 16)" opacity="0.5"/>

  <!-- Middle orbital ring - opposite tilt -->
  <ellipse cx="16" cy="16" rx="11" ry="4" fill="none" stroke="url(#ringGrad)" stroke-width="0.4" transform="rotate(30 16 16)" opacity="0.4"/>

  <!-- Inner orbital ring -->
  <ellipse cx="16" cy="16" rx="7.5" ry="2.5" fill="none" stroke="#a78bfa" stroke-width="0.3" transform="rotate(-5 16 16)" opacity="0.35"/>

  <!-- Hexagonal core - neural network feel -->
  <polygon points="16,9 20,11.5 20,16.5 16,19 12,16.5 12,11.5" fill="none" stroke="#a78bfa" stroke-width="0.6" opacity="0.4"/>
  <polygon points="16,10.5 18.5,12.25 18.5,15.75 16,17.5 13.5,15.75 13.5,12.25" fill="#a78bfa" opacity="0.06"/>

  <!-- Stylized "A" - two arcs converging at apex -->
  <path d="M16 5 L9 23 L12.5 23 L14.5 17.5 L17.5 17.5 L19.5 23 L23 23 Z" fill="url(#core)" filter="url(#softGlow)"/>

  <!-- Apex highlight - bright star point -->
  <circle cx="16" cy="5.5" r="1.2" fill="url(#apexGlow)" filter="url(#strongGlow)"/>

  <!-- Crossbar of A with terminal-inspired notch -->
  <rect x="12" y="14.5" width="8" height="1.5" rx="0.75" fill="#c4b5fd" opacity="0.7"/>

  <!-- Neural nodes at hex vertices -->
  <circle cx="16" cy="9" r="1" fill="#c4b5fd" opacity="0.9" filter="url(#softGlow)"/>
  <circle cx="20" cy="11.5" r="0.8" fill="#a78bfa" opacity="0.7"/>
  <circle cx="20" cy="16.5" r="0.8" fill="#a78bfa" opacity="0.7"/>
  <circle cx="16" cy="19" r="0.8" fill="#7c3aed" opacity="0.8"/>
  <circle cx="12" cy="16.5" r="0.8" fill="#a78bfa" opacity="0.7"/>
  <circle cx="12" cy="11.5" r="0.8" fill="#a78bfa" opacity="0.7"/>

  <!-- Connection lines from nodes to center -->
  <line x1="16" y1="9" x2="16" y2="14" stroke="#c4b5fd" stroke-width="0.3" opacity="0.4"/>
  <line x1="20" y1="11.5" x2="18" y2="14" stroke="#a78bfa" stroke-width="0.3" opacity="0.3"/>
  <line x1="12" y1="11.5" x2="14" y2="14" stroke="#a78bfa" stroke-width="0.3" opacity="0.3"/>

  <!-- Scattered star particles -->
  <circle cx="5" cy="7" r="0.5" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="27" cy="7" r="0.4" fill="#a78bfa" opacity="0.4"/>
  <circle cx="4" cy="22" r="0.4" fill="#7c3aed" opacity="0.5"/>
  <circle cx="28" cy="22" r="0.5" fill="#c4b5fd" opacity="0.4"/>
  <circle cx="8" cy="28" r="0.35" fill="#a78bfa" opacity="0.35"/>
  <circle cx="24" cy="28" r="0.35" fill="#a78bfa" opacity="0.35"/>
  <circle cx="16" cy="26" r="0.4" fill="#c4b5fd" opacity="0.4"/>

  <!-- Terminal cursor hint at bottom -->
  <rect x="14" y="27" width="4" height="0.8" rx="0.4" fill="#a78bfa" opacity="0.3"/>
</svg>
