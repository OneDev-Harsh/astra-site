<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="favGradAlt" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <radialGradient id="favApex" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="60%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="favGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="favShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0.5" stdDeviation="0.8" flood-color="#6d28d9" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background circle for polish -->
  <circle cx="16" cy="16" r="15" fill="#0f0a1a" stroke="#2e1f4a" stroke-width="0.5"/>

  <!-- Apex star glow -->
  <circle cx="16" cy="5.5" r="2.5" fill="url(#favApex)" filter="url(#favGlow)"/>
  <circle cx="16" cy="5.5" r="0.9" fill="#f5f3ff"/>

  <!-- Left stroke of A (thick) -->
  <line x1="16" y1="5.5" x2="6.5" y2="27" stroke="url(#favGradAlt)" stroke-width="4" stroke-linecap="round" filter="url(#favShadow)"/>

  <!-- Right stroke of A (thick) -->
  <line x1="16" y1="5.5" x2="25.5" y2="27" stroke="url(#favGrad)" stroke-width="4" stroke-linecap="round" filter="url(#favShadow)"/>

  <!-- Crossbar (thick, matching weight) -->
  <line x1="10.5" y1="18.5" x2="21.5" y2="18.5" stroke="#c4b5fd" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Subtle orbital arc -->
  <ellipse cx="16" cy="20" rx="13" ry="4.5" fill="none" stroke="#a78bfa" stroke-width="0.35" transform="rotate(-12 16 20)" opacity="0.2"/>
</svg>
